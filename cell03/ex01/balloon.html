<html>
    <head>
        <title>Balloon</title>
        <style>
            #balloon {
                width: 200px;
                height: 200px;
                background-color: red;
                border-radius: 50%;
                cursor:pointer;
                margin: 100px auto;
            }
        </style>
    </head>

    <body>
        <div id="balloon"></div>

    <script>
    let balloon = document.getElementById("balloon"),
        size = 200,
        colors = ['red', 'green', 'blue'],
        colorindex = 0;

        balloon.onclick = () => {
            size += 10;
            if (size > 420) size = 200;
            colorindex = (colorindex + 1) % 3;
            balloon.style.cssText = `width:${size}px;height:${size}px;background:${colors[colorindex]}`;  
        };

        balloon.onmouseleave = () => {
        size = Math.max(200, size - 5);
        colorindex = (colorindex + 2) % 3;

        balloon.style.cssText = `width:${size}px;height:${size}px;background:${colors[colorindex]}`;
        }
        ;
</script>
</body>
</html>

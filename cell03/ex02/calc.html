<html>
<body>

<label for="number1">First number:</label>
<input type="text" id="number1" name="n1"><br><br>

<label for="sign">Choose an operator</label>
<select name="operator" id="operator">
    <option value="add">+</option>
    <option value="minus">-</option>
    <option value="multiply">*</option>
    <option value="divide">/</option>
    <option value="remainder">%</option>
</select><br><br>

<label for="number2">Second number:</label>
<input type="text" id="number2" name="n2"><br><br>

<button onclick="calculate()">Try me!</button>

<script>
    function calculate() {
        let leftVal = document.getElementById("number1").value;
        let rightVal = document.getElementById("number2").value;
        let op = document.getElementById("operator").value;

        let left = Number(leftVal);
        let right = Number(rightVal);

        if (leftVal === "" || rightVal === "" || left != BigInt || right != BigInt|| left < 0 || right < 0 || isNaN(left) || isNaN(right)) {
            alert("Error :(");
            return;
        }

        if ((op === "divide" || op === "remainder") && right === 0) {
            alert("It's over 9000!");
            return;
        }

        let result;

        if (op === "add") {
            result = left + right;
        } else if (op === "minus") {
            result = left - right;
        } else if (op === "multiply") {
            result = left * right;
        } else if (op === "divide") {
            result = left / right;
        } else if (op === "remainder") {
            result = left % right;
        }

        alert("Result: " + result);
        console.log("Result:", result);
    }

setTimeout(function() {
    alert("Please, use me...");
}, 30000);

</script>
</body>
</html>
